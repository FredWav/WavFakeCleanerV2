<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement reussi — WavFakeCleaner</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #09090b;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 48px;
      text-align: center;
      max-width: 480px;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: #a1a1aa; line-height: 1.6; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: #8b5cf6;
      color: #fff;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.15); }
    .sub { font-size: 13px; color: #71717a; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Bienvenue en Pro !</h1>
    <p>
      Votre abonnement WavFakeCleaner Pro est maintenant actif.<br>
      Vous avez acces aux suppressions illimitees et au mode Autopilot.
    </p>
    <a href="/" class="btn">Retour a l'accueil</a>
    <p class="sub">
      Gerez votre abonnement depuis l'extension (Compte &gt; Gerer l'abonnement).
    </p>
  </div>
</body>
</html>
